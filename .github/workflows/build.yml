name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    timeout-minutes: 120

    steps:
    - name: Descargar código
      uses: actions/checkout@v4

    - name: Instalar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: temurin

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          python3-pip python3-venv \
          build-essential git zip unzip \
          libffi-dev libssl-dev \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev \
          libavformat-dev libavcodec-dev \
          zlib1g-dev autoconf automake \
          libtool pkg-config ccache

    - name: Instalar Python tools
      run: |
        pip3 install --upgrade pip
        pip3 install --upgrade \
          buildozer==1.5.0 \
          cython==0.29.36 \
          virtualenv

    - name: Cache Android SDK y NDK
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
        key: buildozer-v2-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-v2-

    - name: Preparar Android SDK
      run: |
        mkdir -p ~/.android
        echo "count=0" > ~/.android/repositories.cfg
        touch ~/.android/repositories.cfg

    - name: Compilar APK
      run: |
        export PATH=$PATH:~/.local/bin
        export ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk
        buildozer -v android debug 2>&1
      env:
        JAVA_HOME: /usr/lib/jvm/temurin-17-amd64

    - name: Guardar APK
      uses: actions/upload-artifact@v4
      with:
        name: PhoneBoosterPro-APK
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error
