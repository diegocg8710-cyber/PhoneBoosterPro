name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - name: Descargar código
      uses: actions/checkout@v4

    - name: Instalar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: temurin

    - name: Instalar dependencias
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          python3-pip python3-venv \
          build-essential git zip unzip \
          libffi-dev libssl-dev \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev \
          autoconf automake libtool ccache
        pip3 install --upgrade buildozer cython==0.29.36

    - name: Cache Android SDK
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
        key: buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: buildozer-

    - name: Aceptar licencias Android
      run: |
        mkdir -p ~/.android
        echo "count=0" > ~/.android/repositories.cfg
        yes | sdkmanager --licenses 2>/dev/null || true

    - name: Compilar APK
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug 2>&1

    - name: Guardar APK descargable
      uses: actions/upload-artifact@v4
      with:
        name: PhoneBoosterPro-APK
        path: bin/*.apk
        retention-days: 30
        if-no-files-found: error
